<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Chantier"/>
<title>Chantier</title>
<style>
:root{
  --bg:#0f1117;--sur:#1a1d27;--sur2:#232738;--brd:#2e3347;
  --acc:#f5a623;--grn:#3dd68c;--txt:#e8eaf0;--mut:#7a8099;
  --red:#e05c5c;--nh:68px;--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--txt);display:flex;flex-direction:column;height:100dvh}

/* HEADER */
.hdr{background:var(--sur);border-bottom:1px solid var(--brd);flex-shrink:0;
  padding:calc(12px + env(safe-area-inset-top,0px)) 16px 10px}
.hdr h1{font-size:18px;font-weight:700;color:var(--acc);letter-spacing:.5px}
.hdr .sub{font-size:11px;color:var(--mut);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* PAGES */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;
  padding:14px 14px calc(var(--nh) + var(--sb) + 14px);
  display:none;-webkit-overflow-scrolling:touch}
.page.on{display:block}

/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nh) + var(--sb));padding-bottom:var(--sb);
  background:var(--sur);border-top:1px solid var(--brd);
  display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;color:var(--mut);font-size:10px;font-weight:600;
  letter-spacing:.4px;cursor:pointer;padding:6px 0}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.nb.on{color:var(--acc)}.nb.on svg{stroke:var(--acc)}

/* CARD */
.card{background:var(--sur);border:1px solid var(--brd);border-radius:12px;padding:14px;margin-bottom:12px}
.ct{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--mut);margin-bottom:12px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 14px;border-radius:8px;
  border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.btn:active{opacity:.75}
.bp{background:var(--acc);color:#1a1200}
.bs{background:var(--sur2);color:var(--txt);border:1px solid var(--brd)}
.bd{background:transparent;color:var(--red);border:1px solid var(--red);font-size:12px;padding:5px 10px}
.bw{width:100%;justify-content:center}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2}

/* INPUTS */
input[type=text],input[type=date],input[type=number]{
  width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:8px;
  color:var(--txt);font-family:inherit;font-size:15px;padding:9px 12px;outline:none;
  -webkit-appearance:none}
input:focus{border-color:var(--acc)}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6)}
label{font-size:12px;color:var(--mut);display:block;margin-bottom:5px;font-weight:500}
.fld{margin-bottom:12px}
.row{display:flex;gap:10px}.row .fld{flex:1}

/* EFFECTIFS PAGE */
.erow{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--brd);gap:10px}
.erow:last-child{border-bottom:none}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.ename{flex:1;font-weight:600;font-size:15px}
.ectrls{display:flex;align-items:center;gap:6px}
.cb{width:36px;height:36px;border-radius:8px;border:1px solid var(--brd);
  background:var(--sur2);color:var(--txt);font-size:22px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.cb:active{background:var(--acc);color:#000}
.cv{width:46px;text-align:center;font-size:20px;font-weight:700;color:var(--acc)}

/* BADGE */
.badge{position:fixed;top:calc(env(safe-area-inset-top,0px) + 58px);left:50%;
  transform:translateX(-50%);background:var(--grn);color:#002d1a;
  padding:7px 18px;border-radius:20px;font-weight:700;font-size:12px;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap}
.badge.on{opacity:1}

/* DONNÉES PAGE */
.ei{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--brd)}
.ei:last-child{border-bottom:none}
.eid{font-weight:600;font-size:14px;flex:1;margin-left:10px}
.af{display:none;margin-top:12px}.af.on{display:block}

/* GRAPHIQUE SVG */
.chart-wrap{width:100%;overflow:hidden}
svg.chart{width:100%;display:block;overflow:visible}

/* LÉGENDE */
.leg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.lc{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;
  font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent}
.lc.off{opacity:.3}
.ld{width:9px;height:9px;border-radius:50%}

/* TABLE */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:260px}
th{background:var(--sur2);color:var(--mut);font-weight:700;padding:7px 8px;
  text-align:center;border-bottom:1px solid var(--brd);white-space:nowrap}
td{padding:7px 8px;text-align:center;border-bottom:1px solid var(--brd)}
tr:last-child td{border-bottom:none}
td:first-child{text-align:left;font-weight:600;color:var(--mut);white-space:nowrap}

.nd{text-align:center;color:var(--mut);padding:24px 0;font-size:13px}
.dtag{font-size:12px;color:var(--mut);margin-bottom:12px}
.dtag span{color:var(--acc);font-weight:700}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
</style>
</head>
<body>

<div class="hdr">
  <h1>⚒ Suivi Chantier</h1>
  <div class="sub" id="proj-info">Aucun projet configuré</div>
</div>

<div class="pages">

<!-- PAGE EFFECTIFS -->
<div class="page on" id="page-effectifs">
  <div class="dtag">📅 Effectifs du <span id="date-lbl"></span></div>
  <div class="card">
    <div class="ct">Effectif par entreprise</div>
    <div id="eff-list"><p class="nd">Ajoutez des entreprises dans « Données »</p></div>
  </div>
  <button class="btn bp bw" onclick="saveEff()">
    <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
    Enregistrer les effectifs du jour
  </button>
</div>

<!-- PAGE GRAPHIQUES -->
<div class="page" id="page-graphiques">
  <div class="card">
    <div class="ct">Filtres</div>
    <div class="leg" id="legend"></div>
  </div>
  <div class="card">
    <div class="ct">Évolution des effectifs</div>
    <div class="chart-wrap" id="chart-wrap">
      <p class="nd" id="chart-nd">Aucune donnée à afficher</p>
    </div>
  </div>
  <div class="card">
    <div class="ct">Tableau récapitulatif</div>
    <div class="tw">
      <table id="recap"><thead><tr id="rec-hd"></tr></thead><tbody id="rec-bd"></tbody></table>
      <p class="nd" id="table-nd" style="display:none">Aucune donnée à afficher</p>
    </div>
  </div>
</div>

<!-- PAGE DONNÉES -->
<div class="page" id="page-donnees">
  <div class="card">
    <div class="ct">Projet</div>
    <div class="fld">
      <label>Nom du projet</label>
      <input type="text" id="nom-proj" placeholder="Ex: Résidence Les Acacias" oninput="saveProj()">
    </div>
    <div class="row">
      <div class="fld"><label>Date début</label><input type="date" id="d-debut" onchange="saveProj()"></div>
      <div class="fld"><label>Date fin</label><input type="date" id="d-fin" onchange="saveProj()"></div>
    </div>
  </div>
  <div class="card">
    <div class="ct">Entreprises</div>
    <div id="ent-list"><p class="nd">Aucune entreprise</p></div>
    <button class="btn bs bw" style="margin-top:10px" onclick="toggleForm()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Ajouter une entreprise
    </button>
    <div class="af" id="add-form">
      <div class="fld" style="margin-top:10px">
        <label>Nom</label>
        <input type="text" id="new-ent" placeholder="Ex: Maçonnerie Dupont"/>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn bp" onclick="addEnt()">Ajouter</button>
        <button class="btn bs" onclick="toggleForm()">Annuler</button>
      </div>
    </div>
  </div>
  <div class="card" style="border-color:#e05c5c44">
    <div class="ct" style="color:var(--red)">Zone danger</div>
    <button class="btn bd" onclick="resetAll()">🗑 Effacer toutes les données</button>
  </div>
</div>

</div><!-- /pages -->

<nav>
  <button class="nb on" id="nav-effectifs" onclick="go('effectifs')">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><circle cx="19" cy="7" r="2.5"/><path d="M23 21v-1.5a2.5 2.5 0 00-4-2"/></svg>
    Effectifs
  </button>
  <button class="nb" id="nav-graphiques" onclick="go('graphiques')">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Graphiques
  </button>
  <button class="nb" id="nav-donnees" onclick="go('donnees')">
    <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0018 0V5"/><path d="M3 12a9 3 0 0018 0"/></svg>
    Données
  </button>
</nav>

<div class="badge" id="badge">✓ Enregistré</div>

<script>
// ─── CONSTANTES ───────────────────────────────────
const C=['#f5a623','#3dd68c','#5b8ff9','#ff6b6b','#c77dff','#ffbe0b','#06d6a0','#ef476f'];

// ─── STATE ────────────────────────────────────────
function load(){try{return JSON.parse(localStorage.getItem('ch')||'{}')}catch{return{}}}
function save(){localStorage.setItem('ch',JSON.stringify(S))}

let S=load();
if(!S.e)S.e=[];          // entreprises
if(!S.d)S.d={};          // effectifs {date:{ent:n}}
if(!S.p)S.p={n:'',d1:'',d2:''};  // projet
let vis={};              // visibilité graphique
let tmp={};              // saisie en cours

// ─── NAV ──────────────────────────────────────────
function go(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
  document.getElementById('page-'+p).classList.add('on');
  document.getElementById('nav-'+p).classList.add('on');
  if(p==='graphiques')renderG();
}

// ─── UTILS ────────────────────────────────────────
function today(){return new Date().toISOString().split('T')[0]}
function fmt(s){if(!s)return'';const[y,m,d]=s.split('-');return d+'/'+m+'/'+y}

// ─── PROJET ───────────────────────────────────────
function saveProj(){
  S.p.n=document.getElementById('nom-proj').value;
  S.p.d1=document.getElementById('d-debut').value;
  S.p.d2=document.getElementById('d-fin').value;
  save();updateHdr();
}
function updateHdr(){
  const t=[];
  if(S.p.n)t.push(S.p.n);
  if(S.p.d1&&S.p.d2)t.push(fmt(S.p.d1)+' → '+fmt(S.p.d2));
  document.getElementById('proj-info').textContent=t.join(' · ')||'Aucun projet configuré';
}
function initDonnees(){
  document.getElementById('nom-proj').value=S.p.n||'';
  document.getElementById('d-debut').value=S.p.d1||'';
  document.getElementById('d-fin').value=S.p.d2||'';
  renderEnts();updateHdr();
}

// ─── ENTREPRISES ──────────────────────────────────
function renderEnts(){
  const el=document.getElementById('ent-list');
  if(!S.e.length){el.innerHTML='<p class="nd">Aucune entreprise</p>';return}
  el.innerHTML=S.e.map((e,i)=>`
    <div class="ei">
      <div class="dot" style="background:${C[i%C.length]}"></div>
      <div class="eid">${e}</div>
      <button class="btn bd" onclick="rmEnt(${i})">Supprimer</button>
    </div>`).join('');
}
function toggleForm(){
  const f=document.getElementById('add-form');
  f.classList.toggle('on');
  if(f.classList.contains('on'))document.getElementById('new-ent').focus();
}
function addEnt(){
  const v=document.getElementById('new-ent').value.trim();
  if(!v)return;
  if(S.e.includes(v)){alert('Déjà existante');return}
  S.e.push(v);save();
  document.getElementById('new-ent').value='';
  toggleForm();renderEnts();renderEff();
}
function rmEnt(i){
  if(!confirm('Supprimer "'+S.e[i]+'" ?'))return;
  const n=S.e[i];S.e.splice(i,1);
  Object.keys(S.d).forEach(dt=>{delete S.d[dt][n]});
  save();renderEnts();renderEff();
}
function resetAll(){
  if(!confirm('Effacer TOUTES les données ?'))return;
  S={e:[],d:{},p:{n:'',d1:'',d2:''}};save();
  initDonnees();renderEff();
}

// ─── EFFECTIFS ────────────────────────────────────
function renderEff(){
  const t=today();
  document.getElementById('date-lbl').textContent=fmt(t);
  const ex=S.d[t]||{};
  const el=document.getElementById('eff-list');
  if(!S.e.length){el.innerHTML='<p class="nd">Ajoutez des entreprises dans « Données »</p>';return}
  S.e.forEach(e=>{if(tmp[e]===undefined)tmp[e]=ex[e]||0});
  el.innerHTML=S.e.map((e,i)=>`
    <div class="erow">
      <div class="dot" style="background:${C[i%C.length]}"></div>
      <div class="ename">${e}</div>
      <div class="ectrls">
        <div class="cb" onclick="chg('${e}',-1)">−</div>
        <div class="cv" id="cv${i}">${tmp[e]||0}</div>
        <div class="cb" onclick="chg('${e}',1)">+</div>
      </div>
    </div>`).join('');
}
function chg(n,d){
  tmp[n]=Math.max(0,(tmp[n]||0)+d);
  const i=S.e.indexOf(n);
  const el=document.getElementById('cv'+i);
  if(el)el.textContent=tmp[n];
}
function saveEff(){
  const t=today();
  if(!S.d[t])S.d[t]={};
  S.e.forEach(e=>{S.d[t][e]=tmp[e]||0});
  save();
  const b=document.getElementById('badge');
  b.classList.add('on');setTimeout(()=>b.classList.remove('on'),2000);
}

// ─── GRAPHIQUE SVG MAISON ─────────────────────────
function renderG(){
  const dates=Object.keys(S.d).sort();
  const ents=S.e;
  ents.forEach(e=>{if(vis[e]===undefined)vis[e]=true});

  // Légende
  document.getElementById('legend').innerHTML=ents.map((e,i)=>`
    <div class="lc ${vis[e]?'':'off'}" style="background:${C[i%C.length]}22;border-color:${C[i%C.length]}"
         onclick="togVis('${e}')">
      <div class="ld" style="background:${C[i%C.length]}"></div>${e}
    </div>`).join('');

  const wrap=document.getElementById('chart-wrap');
  const hasData=dates.length>0&&ents.length>0;
  document.getElementById('chart-nd').style.display=hasData?'none':'block';

  if(!hasData){wrap.querySelector('svg.chart')&&wrap.querySelector('svg.chart').remove();return}

  // Calculs
  const W=wrap.clientWidth||300;
  const H=220;
  const PL=38,PR=12,PT=10,PB=36;
  const cW=W-PL-PR, cH=H-PT-PB;

  // Max valeur
  let mx=0;
  dates.forEach(d=>ents.forEach(e=>{const v=S.d[d]&&S.d[d][e]!=null?S.d[d][e]:0;if(v>mx)mx=v}));
  if(mx<1)mx=5;
  const maxY=mx+Math.ceil(mx*0.1)||5;

  function xPos(i){return PL+(dates.length<2?cW/2:i*(cW/(dates.length-1)))}
  function yPos(v){return PT+cH-(v/maxY)*cH}

  // SVG
  let svg=`<svg class="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Grille Y (5 lignes)
  const steps=5;
  for(let s=0;s<=steps;s++){
    const v=Math.round(maxY*s/steps);
    const y=yPos(v);
    svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#2e3347" stroke-width="1"/>`;
    svg+=`<text x="${PL-5}" y="${y+4}" text-anchor="end" fill="#7a8099" font-size="10" font-family="-apple-system,sans-serif">${v}</text>`;
  }

  // Labels X
  const maxLabels=Math.min(dates.length,6);
  const step=Math.max(1,Math.floor(dates.length/maxLabels));
  dates.forEach((d,i)=>{
    if(i%step===0||i===dates.length-1){
      const x=xPos(i);
      const parts=d.split('-');
      const lbl=parts[2]+'/'+parts[1];
      svg+=`<text x="${x}" y="${H-4}" text-anchor="middle" fill="#7a8099" font-size="10" font-family="-apple-system,sans-serif">${lbl}</text>`;
    }
  });

  // Courbes
  ents.forEach((e,ei)=>{
    if(!vis[e])return;
    const col=C[ei%C.length];
    const pts=dates.map((d,i)=>{
      const v=S.d[d]&&S.d[d][e]!=null?S.d[d][e]:null;
      return v!==null?{x:xPos(i),y:yPos(v)}:null;
    });

    // Zone remplie
    const valid=pts.filter(Boolean);
    if(valid.length>1){
      let area=`M${valid[0].x},${yPos(0)}`;
      valid.forEach(p=>area+=` L${p.x},${p.y}`);
      area+=` L${valid[valid.length-1].x},${yPos(0)} Z`;
      svg+=`<path d="${area}" fill="${col}" fill-opacity="0.08"/>`;
    }

    // Ligne
    let path='';
    pts.forEach((p,i)=>{
      if(!p)return;
      path+=path===''?`M${p.x},${p.y}`:`L${p.x},${p.y}`;
    });
    if(path)svg+=`<path d="${path}" fill="none" stroke="${col}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>`;

    // Points
    pts.forEach(p=>{
      if(!p)return;
      svg+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${col}" stroke="var(--bg)" stroke-width="2"/>`;
    });
  });

  svg+=`</svg>`;
  const old=wrap.querySelector('svg.chart');
  if(old)old.remove();
  wrap.insertAdjacentHTML('afterbegin',svg);

  // Table
  const hd=document.getElementById('rec-hd');
  const bd=document.getElementById('rec-bd');
  const tnd=document.getElementById('table-nd');
  document.getElementById('recap').style.display='';
  tnd.style.display='none';
  hd.innerHTML='<th>Date</th>'+ents.map(e=>`<th>${e}</th>`).join('')+'<th>Total</th>';
  bd.innerHTML=dates.map(d=>{
    const row=S.d[d]||{};
    const tot=ents.reduce((s,e)=>s+(row[e]||0),0);
    return`<tr><td>${fmt(d)}</td>${ents.map(e=>`<td>${row[e]!=null?row[e]:'–'}</td>`).join('')}<td><strong>${tot}</strong></td></tr>`;
  }).join('');
}
function togVis(n){vis[n]=!vis[n];renderG()}

// ─── INIT ─────────────────────────────────────────
initDonnees();
document.getElementById('date-lbl').textContent=fmt(today());
renderEff();
</script>
</body>
</html>
